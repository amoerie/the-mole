app = "the-mole"
primary_region = "ams"

[build]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  DatabasePath = "/data/themole.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "the_mole_data"
  destination = "/data"
  initial_size = "1gb"
