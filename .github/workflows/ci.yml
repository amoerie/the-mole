name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-api:
    name: Build & Test API (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

      - name: Restore API
        run: dotnet restore api/Api.csproj

      - name: Build API
        run: dotnet build api/Api.csproj --configuration Release --no-restore

      - name: Restore Tests
        run: dotnet restore api.tests/Api.Tests.csproj

      - name: Build Tests
        run: dotnet build api.tests/Api.Tests.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test api.tests/Api.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-test-results
          path: api.tests/TestResults/

  build-and-test-client:
    name: Build & Test Client (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Check formatting (Prettier)
        working-directory: client
        run: npm run format:check

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run Tests
        working-directory: client
        run: npm test

      - name: Build
        working-directory: client
        run: npm run build

  deploy:
    name: Deploy to Azure Static Web Apps
    needs: [build-and-test-api, build-and-test-client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VERBOSE: true
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "client"
          api_location: "api"
          output_location: "dist"
          config_file_location: "."
