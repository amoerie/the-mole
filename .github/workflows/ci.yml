name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test-api:
    name: Build & Test API (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore
        env:
          HUSKY: 0

      - name: Check formatting (CSharpier)
        run: dotnet csharpier check .

      - name: Restore API
        run: dotnet restore api/Api.csproj

      - name: Build API
        run: dotnet build api/Api.csproj --configuration Release --no-restore

      - name: Restore Tests
        run: dotnet restore api.tests/Api.Tests.csproj

      - name: Build Tests
        run: dotnet build api.tests/Api.Tests.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: >
          dotnet test api.tests/Api.Tests.csproj
          --configuration Release --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: >
          reportgenerator
          -reports:"api.tests/TestResults/**/coverage.cobertura.xml"
          -targetdir:"api.tests/TestResults/CoverageReport"
          -reporttypes:"Html;TextSummary"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-test-results
          path: api.tests/TestResults/

  build-and-test-client:
    name: Build & Test Client (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Check formatting (Prettier)
        working-directory: client
        run: npm run format:check

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run Tests
        working-directory: client
        run: npm run test:coverage

      - name: Build
        working-directory: client
        run: npm run build

  build-docker:
    name: Build Docker Image
    needs: [build-and-test-api, build-and-test-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
            VITE_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Fly.io
    needs: [build-and-test-api, build-and-test-client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - run: >
          flyctl deploy
          --build-arg "VITE_BUILD_DATE=${{ github.event.head_commit.timestamp }}"
          --build-arg "VITE_COMMIT_SHA=${{ github.sha }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

